<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Small business automation flow</title>
  <desc id="desc">A form, inbox, spreadsheet, and reminder connected into one simple workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#06080d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b7c9ff"/>
      <stop offset="1" stop-color="#5f8dff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="960" height="720" rx="48" fill="url(#bg)"/>
  <g opacity="0.22" stroke="#dbe7ff" stroke-width="1">
    <path d="M0 120h960M0 240h960M0 360h960M0 480h960M0 600h960M120 0v720M240 0v720M360 0v720M480 0v720M600 0v720M720 0v720M840 0v720"/>
  </g>
  <circle cx="802" cy="118" r="160" fill="#6f8cff" opacity="0.12"/>
  <circle cx="176" cy="620" r="210" fill="#67e8f9" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="76" y="96" width="244" height="146" rx="26" fill="#0f1420" stroke="#31405a"/>
    <text x="108" y="140" fill="#9fb2d5" font-family="Inter, Arial" font-size="20" font-weight="700">New customer form</text>
    <rect x="108" y="166" width="150" height="14" rx="7" fill="#dbe7ff" opacity="0.85"/>
    <rect x="108" y="194" width="94" height="14" rx="7" fill="#8ea5d6" opacity="0.7"/>
    <circle cx="276" cy="190" r="22" fill="url(#accent)"/>
    <path d="M266 190l7 7 15-17" fill="none" stroke="#07101e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="642" y="106" width="238" height="134" rx="26" fill="#0f1420" stroke="#31405a"/>
    <text x="674" y="150" fill="#9fb2d5" font-family="Inter, Arial" font-size="20" font-weight="700">Follow-up email</text>
    <path d="M678 182h166v46H678z" rx="12" fill="none" stroke="#6f8cff" stroke-width="4"/>
    <path d="M678 182l83 32 83-32" fill="none" stroke="#6f8cff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="98" y="430" width="256" height="150" rx="26" fill="#0f1420" stroke="#31405a"/>
    <text x="130" y="474" fill="#9fb2d5" font-family="Inter, Arial" font-size="20" font-weight="700">Updated spreadsheet</text>
    <g fill="none" stroke="#6f8cff" opacity="0.85">
      <rect x="132" y="502" width="176" height="46" rx="8"/>
      <path d="M132 518h176M132 534h176M176 502v46M230 502v46"/>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="612" y="426" width="268" height="154" rx="26" fill="#0f1420" stroke="#31405a"/>
    <text x="644" y="470" fill="#9fb2d5" font-family="Inter, Arial" font-size="20" font-weight="700">Reminder created</text>
    <circle cx="684" cy="526" r="28" fill="none" stroke="#6f8cff" stroke-width="5"/>
    <path d="M684 510v20l16 10" fill="none" stroke="#dbe7ff" stroke-width="5" stroke-linecap="round"/>
    <rect x="734" y="510" width="92" height="12" rx="6" fill="#dbe7ff" opacity="0.85"/>
    <rect x="734" y="536" width="64" height="12" rx="6" fill="#8ea5d6" opacity="0.7"/>
  </g>

  <g filter="url(#glow)">
    <rect x="368" y="268" width="224" height="176" rx="36" fill="#111827" stroke="#7aa7ff" stroke-width="2"/>
    <text x="480" y="325" text-anchor="middle" fill="#f4f7fb" font-family="Inter, Arial" font-size="26" font-weight="800">One simple</text>
    <text x="480" y="360" text-anchor="middle" fill="#f4f7fb" font-family="Inter, Arial" font-size="26" font-weight="800">workflow</text>
    <text x="480" y="402" text-anchor="middle" fill="#aab8d4" font-family="Inter, Arial" font-size="18">less copying • fewer misses</text>
  </g>

  <g fill="none" stroke="#7aa7ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M320 176C392 174 400 244 424 270"/>
    <path d="M642 176C570 174 560 244 536 270"/>
    <path d="M354 506C408 500 410 448 430 428"/>
    <path d="M612 506C556 500 550 448 530 428"/>
  </g>
  <g fill="#7aa7ff">
    <circle cx="424" cy="270" r="7"/><circle cx="536" cy="270" r="7"/><circle cx="430" cy="428" r="7"/><circle cx="530" cy="428" r="7"/>
  </g>
</svg>
