<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030408"/>
      <stop offset="50%" style="stop-color:#0a0d14"/>
      <stop offset="100%" style="stop-color:#050608"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Far layer - distant nodes (smaller, slower) -->
  <g className="neural-layer neural-far" opacity="0.3">
    <circle cx="100" cy="100" r="2" fill="#1e90ff"/>
    <circle cx="200" cy="150" r="2.5" fill="#1e90ff"/>
    <circle cx="350" cy="80" r="2" fill="#1e90ff"/>
    <circle cx="500" cy="120" r="2.5" fill="#1e90ff"/>
    <circle cx="650" cy="90" r="2" fill="#1e90ff"/>
    <circle cx="750" cy="140" r="2" fill="#1e90ff"/>
    <circle cx="150" cy="300" r="2" fill="#1e90ff"/>
    <circle cx="280" cy="250" r="2" fill="#1e90ff"/>
    <circle cx="420" cy="280" r="2" fill="#1e90ff"/>
    <circle cx="580" cy="240" r="2" fill="#1e90ff"/>
    <circle cx="700" cy="290" r="2" fill="#1e90ff"/>
    <circle cx="100" cy="450" r="2" fill="#1e90ff"/>
    <circle cx="250" cy="420" r="2.5" fill="#1e90ff"/>
    <circle cx="400" cy="480" r="2" fill="#1e90ff"/>
    <circle cx="550" cy="440" r="2" fill="#1e90ff"/>
    <circle cx="680" cy="470" r="2.5" fill="#1e90ff"/>
    <circle cx="180" cy="520" r="2" fill="#1e90ff"/>
    <circle cx="320" cy="550" r="2" fill="#1e90ff"/>
    <circle cx="480" cy="530" r="2" fill="#1e90ff"/>
    <circle cx="620" cy="560" r="2" fill="#1e90ff"/>
  </g>
  
  <!-- Mid layer -->
  <g className="neural-layer neural-mid" opacity="0.5">
    <circle cx="150" cy="200" r="3" fill="#00d4ff"/>
    <circle cx="300" cy="180" r="3.5" fill="#00d4ff"/>
    <circle cx="450" cy="200" r="3" fill="#00d4ff"/>
    <circle cx="600" cy="170" r="3" fill="#00d4ff"/>
    <circle cx="200" cy="380" r="3" fill="#00d4ff"/>
    <circle cx="350" cy="350" r="3.5" fill="#00d4ff"/>
    <circle cx="500" cy="380" r="3" fill="#00d4ff"/>
    <circle cx="650" cy="360" r="3" fill="#00d4ff"/>
    <circle cx="120" cy="500" r="3" fill="#00d4ff"/>
    <circle cx="280" cy="480" r="3" fill="#00d4ff"/>
    <circle cx="440" cy="510" r="3.5" fill="#00d4ff"/>
    <circle cx="600" cy="490" r="3" fill="#00d4ff"/>
  </g>
  
  <!-- Connection lines - far -->
  <g className="neural-lines neural-lines-far" stroke="#1e90ff" stroke-width="0.5" opacity="0.2">
    <line x1="100" y1="100" x2="200" y2="150"/>
    <line x1="350" y1="80" x2="500" y2="120"/>
    <line x1="150" y1="300" x2="280" y2="250"/>
    <line x1="420" y1="280" x2="580" y2="240"/>
    <line x1="100" y1="450" x2="250" y2="420"/>
    <line x1="400" y1="480" x2="550" y2="440"/>
  </g>
  
  <!-- Connection lines - mid -->
  <g className="neural-lines neural-lines-mid" stroke="#00d4ff" stroke-width="0.8" opacity="0.35">
    <line x1="150" y1="200" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="450" y2="200"/>
    <line x1="450" y1="200" x2="600" y2="170"/>
    <line x1="200" y1="380" x2="350" y2="350"/>
    <line x1="350" y1="350" x2="500" y2="380"/>
    <line x1="500" y1="380" x2="650" y2="360"/>
  </g>
</svg>