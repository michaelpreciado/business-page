<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030408"/>
      <stop offset="50%" style="stop-color:#0a0d14"/>
      <stop offset="100%" style="stop-color:#050608"/>
    </linearGradient>
    <!-- 3D sphere gradient for nodes -->
    <radialGradient id="sphere-far" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#5bb5e8"/>
      <stop offset="50%" style="stop-color:#1e90ff"/>
      <stop offset="100%" style="stop-color:#0a4a7a"/>
    </radialGradient>
    <radialGradient id="sphere-mid" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#6dd5fa"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0088aa"/>
    </radialGradient>
    <radialGradient id="sphere-close" cx="30%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#9fe8ff"/>
      <stop offset="40%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#006688"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow-far" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-mid" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Far layer - distant 3D spheres (smaller, slower) -->
  <g className="neural-layer neural-far" opacity="0.4">
    <circle cx="100" cy="100" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="200" cy="150" r="3.5" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="350" cy="80" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="500" cy="120" r="3.5" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="650" cy="90" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="750" cy="140" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="150" cy="300" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="280" cy="250" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="420" cy="280" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="580" cy="240" r="3.5" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="700" cy="290" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="100" cy="450" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="250" cy="420" r="3.5" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="400" cy="480" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="550" cy="440" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="680" cy="470" r="3.5" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="180" cy="520" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="320" cy="550" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="480" cy="530" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
    <circle cx="620" cy="560" r="3" fill="url(#sphere-far)" filter="url(#glow-far)"/>
  </g>
  
  <!-- Mid layer - 3D spheres -->
  <g className="neural-layer neural-mid" opacity="0.6">
    <circle cx="150" cy="200" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="300" cy="180" r="5" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="450" cy="200" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="600" cy="170" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="200" cy="380" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="350" cy="350" r="5" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="500" cy="380" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="650" cy="360" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="120" cy="500" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="280" cy="480" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="440" cy="510" r="5" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
    <circle cx="600" cy="490" r="4" fill="url(#sphere-mid)" filter="url(#glow-mid)"/>
  </g>
  
  <!-- Connection lines - far -->
  <g className="neural-lines neural-lines-far" stroke="#1e90ff" stroke-width="0.5" opacity="0.25">
    <line x1="100" y1="100" x2="200" y2="150"/>
    <line x1="350" y1="80" x2="500" y2="120"/>
    <line x1="150" y1="300" x2="280" y2="250"/>
    <line x1="420" y1="280" x2="580" y2="240"/>
    <line x1="100" y1="450" x2="250" y2="420"/>
    <line x1="400" y1="480" x2="550" y2="440"/>
  </g>
  
  <!-- Connection lines - mid -->
  <g className="neural-lines neural-lines-mid" stroke="#00d4ff" stroke-width="0.8" opacity="0.4">
    <line x1="150" y1="200" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="450" y2="200"/>
    <line x1="450" y1="200" x2="600" y2="170"/>
    <line x1="200" y1="380" x2="350" y2="350"/>
    <line x1="350" y1="350" x2="500" y2="380"/>
    <line x1="500" y1="380" x2="650" y2="360"/>
  </g>
</svg>