<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Before and after workflow example</title>
  <desc id="desc">Manual busywork on the left becomes organized tasks, reminders, and replies on the right.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111827"/><stop offset="1" stop-color="#080b12"/></linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#dbe7ff"/><stop offset="1" stop-color="#7aa7ff"/></linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <rect width="1120" height="620" rx="44" fill="#07080b"/>
  <circle cx="890" cy="95" r="230" fill="#7aa7ff" opacity=".08"/>
  <circle cx="210" cy="560" r="240" fill="#67e8f9" opacity=".055"/>

  <g filter="url(#soft)">
    <rect x="70" y="76" width="430" height="468" rx="34" fill="url(#panel)" stroke="#293448"/>
    <text x="112" y="136" fill="#f4f7fb" font-family="Inter, Arial" font-size="34" font-weight="800">Before</text>
    <text x="112" y="174" fill="#aab8d4" font-family="Inter, Arial" font-size="19">Everything depends on memory</text>
    <g font-family="Inter, Arial" font-size="22" fill="#d0d8e8">
      <text x="126" y="248">✕ Lead sitting in inbox</text>
      <text x="126" y="308">✕ Copy-paste into sheet</text>
      <text x="126" y="368">✕ Manual follow-up later</text>
      <text x="126" y="428">✕ Someone forgets a step</text>
    </g>
    <path d="M118 474h310" stroke="#3a4559" stroke-width="2"/>
    <text x="126" y="512" fill="#8f9bb1" font-family="Inter, Arial" font-size="18">Result: slow, scattered, easy to miss</text>
  </g>

  <g filter="url(#soft)">
    <rect x="620" y="76" width="430" height="468" rx="34" fill="url(#panel)" stroke="#405783"/>
    <text x="662" y="136" fill="#f4f7fb" font-family="Inter, Arial" font-size="34" font-weight="800">After</text>
    <text x="662" y="174" fill="#aab8d4" font-family="Inter, Arial" font-size="19">One simple process handles the basics</text>
    <g font-family="Inter, Arial" font-size="22" fill="#d0d8e8">
      <text x="676" y="248">✓ Lead gets organized</text>
      <text x="676" y="308">✓ Sheet updates automatically</text>
      <text x="676" y="368">✓ Follow-up is drafted</text>
      <text x="676" y="428">✓ Reminder is created</text>
    </g>
    <path d="M670 474h310" stroke="#50699b" stroke-width="2"/>
    <text x="676" y="512" fill="#c7d5ff" font-family="Inter, Arial" font-size="18">Result: clearer, faster, harder to drop</text>
  </g>

  <g>
    <path d="M520 310h74" stroke="url(#good)" stroke-width="8" stroke-linecap="round"/>
    <path d="M575 282l30 28-30 28" fill="none" stroke="url(#good)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="560" cy="310" r="58" fill="#7aa7ff" opacity=".1"/>
  </g>
</svg>
