<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- 3D sphere gradient -->
    <radialGradient id="sphereGrad" cx="30%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#9fe8ff"/>
      <stop offset="40%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#006688"/>
    </radialGradient>
    <!-- Secondary sphere -->
    <radialGradient id="sphereGrad2" cx="30%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#5bb5e8"/>
      <stop offset="50%" style="stop-color:#1e90ff"/>
      <stop offset="100%" style="stop-color:#0a4a7a"/>
    </radialGradient>
    <!-- Glow -->
    <filter id="logoGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip for container -->
    <clipPath id="containerClip">
      <rect width="120" height="120" rx="24"/>
    </clipPath>
  </defs>
  
  <!-- Background container -->
  <rect width="120" height="120" rx="24" fill="#030408"/>
  <rect width="120" height="120" rx="24" fill="url(#bgGrad)" opacity="0.3"/>
  
  <!-- Neural network nodes as 3D spheres -->
  <g filter="url(#logoGlow)">
    <!-- Central node -->
    <circle cx="60" cy="50" r="14" fill="url(#sphereGrad)"/>
    
    <!-- Connected nodes -->
    <circle cx="35" cy="75" r="10" fill="url(#sphereGrad2)"/>
    <circle cx="85" cy="75" r="10" fill="url(#sphereGrad2)"/>
    <circle cx="60" cy="95" r="8" fill="url(#sphereGrad2)"/>
    
    <!-- Connection lines -->
    <line x1="48" y1="58" x2="38" y2="70" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
    <line x1="72" y1="58" x2="82" y2="70" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
    <line x1="55" y1="62" x2="55" y2="88" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Subtle ring -->
  <circle cx="60" cy="60" r="52" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="60" cy="60" r="46" stroke="#1e90ff" stroke-width="0.5" fill="none" opacity="0.15"/>
</svg>